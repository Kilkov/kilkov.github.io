<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Supabase Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <h1>Supabase connection test</h1>
  <pre id="output">Testing...</pre>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
// 1) PUT YOUR VALUES HERE
const SUPABASE_URL = 'yuyzpgfgynxiuqgcvhhe';      // <- exact Config/API URL
const SUPABASE_ANON_KEY = 'sb_publishable_z463erMxkY_iDjPnm47Epw_Xu0WnWW7'; // <- anon public key

console.log('Supabase URL:', SUPABASE_URL);
console.log('Supabase anon key starts with:', SUPABASE_ANON_KEY.slice(0, 10));

let supabaseClient;
try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  console.log('Supabase client created:', !!supabaseClient);
} catch (e) {
  console.error('Error creating Supabase client:', e);
}

const out = document.getElementById('output');

async function testSupabase() {
  try {
    out.textContent = 'Creating test list...';

    const { data, error } = await supabaseClient
      .from('lists')
      .insert({ title: 'Test list from GitHub Pages', items: [] })
      .select()
      .single();

    console.log('Insert result:', { data, error });

    if (error) {
      out.textContent = 'Insert error:\n' + JSON.stringify(error, null, 2);
      return;
    }

    out.textContent = 'Insert OK:\n' + JSON.stringify(data, null, 2);

    const { data: rows, error: selError } = await supabaseClient
      .from('lists')
      .select('*')
      .limit(5);

    console.log('Select result:', { rows, selError });

    if (selError) {
      out.textContent += '\n\nSelect error:\n' + JSON.stringify(selError, null, 2);
      return;
    }

    out.textContent += '\n\nSelect OK:\n' + JSON.stringify(rows, null, 2);
  } catch (e) {
    console.error('Unexpected error in testSupabase:', e);
    out.textContent = 'Unexpected error: ' + e.toString();
  }
}

testSupabase();
</script>
</body>
</html>
